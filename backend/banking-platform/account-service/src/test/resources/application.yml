spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/banking_read
    driver-class-name: org.postgresql.Driver
    username: banking
    password: banking
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:29092
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/retail

eventstore:
  connection-string: esdb://localhost:2113?tls=false&nodePreference=leader

management:
  endpoints:
    web:
      exposure:
        include: health,info
