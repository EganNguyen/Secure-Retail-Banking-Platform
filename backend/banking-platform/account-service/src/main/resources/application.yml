server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/banking_read?stringtype=unspecified
    username: banking
    password: banking
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: account-service-account
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/retail

eventstore:
  connection-string: esdb://localhost:2113?tls=false

kafka:
  topics:
    account-events: account-events
  consumer:
    group: account-service-account

outbox:
  publisher:
    delay-ms: 200

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
logging:
  level:
    org.springframework.security: DEBUG
    com.bank: DEBUG
